# ============================================================
# 会计平台 — Docker Swarm Stack
# ============================================================
# 用法:
#   1. source env.swarm
#   2. docker stack deploy -c docker-compose.swarm.yml accounting-platform
#
# ⚠️ 持久化存储:
#   生产环境建议预先创建外部 volume 并挂载到共享存储(NFS/Ceph/GlusterFS)，
#   或修改下方 volume driver_opts 指向 NFS 服务器。
#   postgres / redis 通过 placement.constraints 固定到带标签的数据节点。
# ============================================================

volumes:
  pgdata:
    driver: local
    # driver_opts:
    #   type: nfs
    #   o: addr=nfs-server.example.com,rw,hard,intr,nolock
    #   device: ":/var/nfs/accounting/pgdata"
  redisdata:
    driver: local
    # driver_opts:
    #   type: nfs
    #   o: addr=nfs-server.example.com,rw,hard,intr,nolock
    #   device: ":/var/nfs/accounting/redisdata"

networks:
  accounting-network:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"

configs:
  nginx_default_conf:
    file: ./configs/nginx-default.conf

secrets:
  database_url:
    external: true
  postgres_password:
    external: true
  jwt_secret:
    external: true
  grafana_admin_password:
    external: true

services:
  # ============================================================
  # 数据层
  # ============================================================
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: accounting
      POSTGRES_DB: accounting
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - accounting-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 30s
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
      placement:
        constraints:
          - node.labels.storage == persistent
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,node_id"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - accounting-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      placement:
        constraints:
          - node.labels.storage == persistent
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: rollback
        order: start-first
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,node_id"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

  # ============================================================
  # 后端微服务
  # ============================================================
  auth-service:
    image: ghcr.io/financial-platform-se33-ft-cp/accounting-platform-auth-service:latest
    command: uvicorn auth_service.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      CORS_ORIGINS: '["http://localhost:3000"]'
      AUTH_SERVICE_URL: "http://auth-service:8000"
      POSTGRES_USER: accounting
      POSTGRES_DB: accounting
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    secrets:
      - source: database_url
        mode: 0444
      - source: jwt_secret
        mode: 0444
    networks:
      - accounting-network
    deploy:
      replicas: 2
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 30s
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 30s
      placement:
        preferences:
          - spread: node.id
        constraints: []
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,node_id"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

