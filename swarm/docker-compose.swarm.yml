  # ============================================================
  # 前端与网关
  # ============================================================
  frontend:
    image: ghcr.io/financial-platform-se33-ft-cp/accounting-platform-frontend:latest
    environment:
      APP_ENV: production
      NODE_ENV: production
    networks:
      - accounting-network
    deploy:
      replicas: 2
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 30s
      placement:
        preferences:
          - spread: node.id
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,node_id"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
    configs:
      - source: nginx_default_conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - accounting-network
    deploy:
      replicas: 2
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: rollback
        order: start-first
        monitor: 15s
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 15s
      placement:
        preferences:
