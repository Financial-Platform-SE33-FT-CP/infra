global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8000']
    metrics_path: /metrics

  - job_name: 'tenant-service'
    static_configs:
      - targets: ['tenant-service:8000']
    metrics_path: /metrics

  - job_name: 'coa-service'
    static_configs:
      - targets: ['coa-service:8000']
    metrics_path: /metrics

  - job_name: 'ledger-service'
    static_configs:
      - targets: ['ledger-service:8000']
    metrics_path: /metrics

  - job_name: 'audit-service'
    static_configs:
      - targets: ['audit-service:8000']
    metrics_path: /metrics

  - job_name: 'ar-ap-service'
    static_configs:
      - targets: ['ar-ap-service:8000']
    metrics_path: /metrics

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
