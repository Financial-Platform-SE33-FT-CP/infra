apiVersion: v1
kind: Secret
metadata:
  name: accounting-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "accounting-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | default (printf "postgresql+asyncpg://accounting:changeme@postgres:5432/accounting") | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | default "changeme" | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | default "changeme" | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaPassword | default "changeme" | quote }}
