name: CI - Infra

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: "0.6.7"

      - name: Validate K8s manifests
        run: |
          kubeconform -kubernetes-version 1.30.0 -strict -summary k8s/

  validate-docker-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker/docker-compose.yml config > /dev/null

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml config > /dev/null

      - name: Validate docker-compose.observability.yml
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.observability.yml config > /dev/null
