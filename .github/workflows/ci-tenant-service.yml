name: CI - Tenant Service

on:
  push:
    paths:
      - "tenant-service/**"
  pull_request:
    paths:
      - "tenant-service/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: tenant-service
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Ruff check
        working-directory: tenant-service
        run: ruff check .

      - name: Black check
        working-directory: tenant-service
        run: black --check .

      - name: isort check
        working-directory: tenant-service
        run: isort --check-only .

      - name: mypy
        working-directory: tenant-service
        run: mypy .

      - name: pytest
        working-directory: tenant-service
        run: pytest
