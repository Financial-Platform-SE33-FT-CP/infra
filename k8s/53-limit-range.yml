apiVersion: v1
kind: LimitRange
metadata:
  name: accounting-limits
  namespace: accounting-platform
spec:
  limits:
    - default:
        cpu: "1"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "4"
        memory: 4Gi
      min:
        cpu: "50m"
        memory: 64Mi
      type: Container
