version: "3.9"

volumes:
  accounting-pgdata:
  accounting-redisdata:
  grafana-data:
  prometheus-data:
  loki-data:

networks:
  accounting-network:
    driver: bridge

services:
  # ============================================================
  # 数据层
  # ============================================================
  postgres:
    image: postgres:17-alpine
    container_name: accounting-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - accounting-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accounting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accounting_secret}
      POSTGRES_DB: ${POSTGRES_DB:-accounting}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accounting}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: accounting-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - accounting-redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # 后端微服务
  # ============================================================
  auth-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    container_name: accounting-auth-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://accounting:accounting_secret@postgres:5432/accounting}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tenant-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE: tenant-service
    container_name: accounting-tenant-service
    restart: unless-stopped
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://accounting:accounting_secret@postgres:5432/accounting}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  coa-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE: coa-service
    container_name: accounting-coa-service
    restart: unless-stopped
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://accounting:accounting_secret@postgres:5432/accounting}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ledger-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE: ledger-service
    container_name: accounting-ledger-service
    restart: unless-stopped
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://accounting:accounting_secret@postgres:5432/accounting}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  audit-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE: audit-service
    container_name: accounting-audit-service
    restart: unless-stopped
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://accounting:accounting_secret@postgres:5432/accounting}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ar-ap-service:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        SERVICE: ar-ap-service
    container_name: accounting-ar-ap-service
    restart: unless-stopped
    ports:
      - "8006:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://accounting:accounting_secret@postgres:5432/accounting}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # 前端与网关
  # ============================================================
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: accounting-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - tenant-service
      - coa-service
      - ledger-service
      - audit-service
      - ar-ap-service
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: accounting-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - auth-service
      - tenant-service
      - coa-service
      - ledger-service
      - audit-service
      - ar-ap-service
    networks:
      - accounting-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
