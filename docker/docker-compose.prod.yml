# ============================================================
# 会计平台 — 单机生产环境 Compose
# 使用 GHCR 预构建镜像，不依赖 Swarm
# ============================================================
#
# 部署:
#   source .env.production
#   docker compose -f docker-compose.prod.yml up -d
#
# 或配合可观测性:
#   docker compose -f docker-compose.prod.yml -f docker-compose.observability.yml up -d
# ============================================================

volumes:
  accounting-pgdata:
  accounting-redisdata:

networks:
  accounting-network:
    driver: bridge

services:
  # ============================================================
  # 数据层
  # ============================================================
  postgres:
    image: postgres:17-alpine
    container_name: accounting-postgres
    restart: unless-stopped
    volumes:
      - accounting-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accounting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-accounting}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accounting}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: accounting-redis
    restart: unless-stopped
    volumes:
      - accounting-redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # 后端微服务 (使用 GHCR 预构建镜像)
  # ============================================================
  auth-service:
    image: ghcr.io/financial-platform-se33-ft-cp/accounting-platform-auth-service:develop
    container_name: accounting-auth-service
    restart: unless-stopped
    command: uvicorn auth_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8000}
      EMAIL_VERIFICATION_REQUIRED: "${EMAIL_VERIFICATION_REQUIRED:-true}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tenant-service:
    image: ghcr.io/financial-platform-se33-ft-cp/accounting-platform-tenant-service:develop
    container_name: accounting-tenant-service
    restart: unless-stopped
    command: uvicorn tenant_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8000}
      TENANT_INTERNAL_API_TOKEN: ${TENANT_INTERNAL_API_TOKEN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  coa-service:
    image: ghcr.io/financial-platform-se33-ft-cp/accounting-platform-coa-service:develop
    container_name: accounting-coa-service
    restart: unless-stopped
    command: uvicorn coa_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8000}
      TENANT_INTERNAL_API_TOKEN: ${TENANT_INTERNAL_API_TOKEN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ledger-service:
    image: ghcr.io/financial-platform-se33-ft-cp/accounting-platform-ledger-service:develop
    container_name: accounting-ledger-service
    restart: unless-stopped
    command: uvicorn ledger_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
