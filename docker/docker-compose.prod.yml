      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8000}
      TENANT_INTERNAL_API_TOKEN: ${TENANT_INTERNAL_API_TOKEN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  audit-service:
    image: ghcr.io/financial-platform-se33-ft-cp/accounting-platform-audit-service:develop
    container_name: accounting-audit-service
    restart: unless-stopped
    command: uvicorn audit_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
