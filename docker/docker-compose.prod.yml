    container_name: accounting-ar-ap-service
    restart: unless-stopped
    command: uvicorn ar_ap_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # 前端与网关
  # ============================================================
  # ============================================================
  # 前端 (推荐使用 GHCR 预构建镜像; 本地 build 作为 fallback)
  # ============================================================
  frontend:
    image: ghcr.io/financial-platform-se33-ft-cp/accounting-platform-frontend:develop
    # 当 GHCR 镜像尚未包含最新前端修改时, 可在服务器端本地构建:
    #   1. 上传 frontend 源码到服务器
    #   2. 取消下面 build 注释, 注释 image 行
    #   3. docker compose build frontend && docker compose up -d frontend
    # build:
    #   context: ./build/frontend
    #   dockerfile: Dockerfile
    container_name: accounting-frontend
    restart: unless-stopped
    environment:
      APP_ENV: production
      NODE_ENV: production
    depends_on:
      - auth-service
      - tenant-service
      - coa-service
      - ledger-service
      - audit-service
      - ar-ap-service
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: accounting-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - tenant-service
      - coa-service
      - ledger-service
      - audit-service
      - ar-ap-service
    networks:
      - accounting-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
